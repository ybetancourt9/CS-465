<section class="page-card p-4 p-lg-5">
  <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
    <div>
      <p class="text-uppercase text-brand small fw-semibold mb-2">Admin Dashboard</p>
      <h1 class="h2 mb-2">Manage Travlr Trips</h1>
      <p class="text-muted mb-0">
        Add, edit, and remove trips from the MongoDB collection through the Angular admin app.
      </p>
    </div>

    <a *ngIf="isLoggedIn()" class="btn btn-primary align-self-start align-self-lg-center" routerLink="/trips/new">
      Add Trip
    </a>
  </div>

  <div *ngIf="isLoading" class="alert alert-light border mb-0">
    Loading trips...
  </div>

  <div *ngIf="!isLoading && message" class="alert alert-info">
    {{ message }}
  </div>

  <div *ngIf="!isLoading && trips.length" class="row g-4">
    <div class="col-md-6 col-xl-4" *ngFor="let trip of trips; trackBy: trackByCode">
      <app-trip-card [trip]="trip" (deleteTrip)="handleDelete($event)" />
    </div>
  </div>
</section>
