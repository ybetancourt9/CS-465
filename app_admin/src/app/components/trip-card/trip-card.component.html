<article class="card h-100 border-0 shadow-sm overflow-hidden">
  <img [src]="imageUrl" [alt]="trip.name" class="card-img-top trip-card-image">

  <div class="card-body d-flex flex-column gap-3">
    <div>
      <div class="d-flex justify-content-between align-items-start gap-3">
        <div>
          <p class="text-uppercase text-muted small mb-1">{{ trip.code }}</p>
          <h2 class="h5 mb-1">{{ trip.name }}</h2>
          <p class="text-muted mb-0">{{ trip.resort }}</p>
        </div>
        <span class="badge text-bg-light border">{{ trip.length }}</span>
      </div>
    </div>

    <div class="small text-muted d-flex flex-column gap-1">
      <span><strong class="text-dark">Start:</strong> {{ trip.start | date: 'mediumDate' }}</span>
      <span><strong class="text-dark">Per person:</strong> ${{ trip.perPerson }}</span>
      <span><strong class="text-dark">Image:</strong> {{ trip.image }}</span>
    </div>

    <p class="card-text mb-0">{{ trip.description }}</p>

    <div class="mt-auto d-flex gap-2">
      <a class="btn btn-primary btn-sm" [routerLink]="['/trips', trip.code, 'edit']">Edit</a>
      <button class="btn btn-outline-danger btn-sm" type="button" (click)="onDelete()">Delete</button>
    </div>
  </div>
</article>
