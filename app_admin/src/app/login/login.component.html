<section class="page-card p-4 p-lg-5 mx-auto login-card">
  <div class="mb-4">
    <p class="text-uppercase text-brand small fw-semibold mb-2">Admin Access</p>
    <h1 class="h3 mb-2">Log In</h1>
    <p class="text-muted mb-0">
      Sign in to manage trips in the admin application.
    </p>
  </div>

  <form (ngSubmit)="onLoginSubmit()" novalidate>
    <div *ngIf="formError" class="alert alert-danger" role="alert">
      {{ formError }}
    </div>

    <div class="mb-3">
      <label class="form-label" for="name">Name</label>
      <input
        id="name"
        name="name"
        type="text"
        class="form-control"
        placeholder="Enter name"
        [(ngModel)]="credentials.name">
    </div>

    <div class="mb-3">
      <label class="form-label" for="email">Email</label>
      <input
        id="email"
        name="email"
        type="email"
        class="form-control"
        placeholder="Enter email"
        [(ngModel)]="credentials.email">
    </div>

    <div class="mb-4">
      <label class="form-label" for="password">Password</label>
      <input
        id="password"
        name="password"
        type="password"
        class="form-control"
        placeholder="Enter password"
        [(ngModel)]="credentials.password">
    </div>

    <button class="btn btn-primary w-100" type="submit">Sign In</button>
  </form>
</section>
